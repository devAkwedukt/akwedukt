name: deploy-studio

on:
  push:
    branches:
      - main
      - master

env:
  SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
  SANITY_STUDIO_APP_ID: ${{ vars.SANITY_APP_ID }}
  SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
  SANITY_STUDIO_ORGANIZATION_ID: ${{ vars.SANITY_ORGANIZATION_ID }}
  SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET }}
  SANITY_STUDIO_API_VERSION: ${{ vars.SANITY_API_VERSION }}
  TURBO_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Cache turbo build outputs
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        working-directory: apps/studio
        run: pnpm install --frozen-lockfile

      - name: Deploy Sanity Studio
        working-directory: apps/studio
        run: pnpm exec sanity deploy -y
